name: Receive update from website

on:
  repository_dispatch:
    types: [update_disabled]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update save.json
        run: |
          echo '${{ github.event.client_payload.data }}' > save.json

      - name: Commit changes
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add save.json
          git commit -m "Website update" || echo "No changes to commit"
          git push https://x-access-token:${TOKEN}@github.com/${{ github.repository }}.git || echo "No changes to push"
